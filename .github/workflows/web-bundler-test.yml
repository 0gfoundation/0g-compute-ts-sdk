name: Web Bundler Compatibility

# Regression coverage for browser-bundler consumers of the SDK
# (PR #216 / v0.8.3). The fixture in `tests/web-bundler-app/` is a minimal
# Next.js 15 app that imports the SDK from a `'use client'` page. Two
# production builds run end-to-end:
#
#   - Webpack (default `next build`)
#   - Turbopack (`next build --turbopack`)
#
# Both must compile and statically export. A strict ESM stub aliased to
# `'fs'` makes Turbopack's strict named-export validation catch any
# top-level `import { â€¦ } from 'fs'` reintroduced into the SDK ESM bundle â€”
# the exact class of regression that surfaced as "Export createWriteStream
# / statSync doesn't exist in target module".
#
# In addition we run a fast static assertion directly against the built
# `lib.esm/` output as a belt-and-suspenders check that runs even if the
# Next.js fixture install/build regresses for unrelated reasons.

on:
    push:
        branches: [main]
        paths:
            - 'src.ts/**'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'rollup.config.mjs'
            - 'tests/web-bundler-app/**'
            - '.github/workflows/web-bundler-test.yml'
    pull_request:
        branches: [main]
        paths:
            - 'src.ts/**'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'rollup.config.mjs'
            - 'tests/web-bundler-app/**'
            - '.github/workflows/web-bundler-test.yml'
    workflow_dispatch:

jobs:
    web-bundler-build:
        name: Browser bundle build (Next.js 15 / ${{ matrix.bundler }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                bundler: [webpack, turbopack]
            fail-fast: false

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 9.15.4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: 'pnpm'

            - name: Install SDK dependencies
              run: pnpm install --frozen-lockfile

            - name: Build SDK
              run: pnpm build

            - name: Static regression assertion (no top-level Node-only named/namespace imports)
              # Catches the same class of bug as the Turbopack build below
              # but runs in milliseconds and is robust against future
              # Turbopack behaviour changes.
              #
              # Blocks any top-level **named** or **namespace** import of a
              # Node-only built-in in the SDK ESM bundle:
              #
              #   - `import { foo } from 'fs/promises'`   (named)
              #   - `import * as x from 'fs/promises'`    (namespace)
              #
              # These are the shapes that fail strict ESM named-export
              # validation (Turbopack/Vite/strict Webpack) when the
              # specifier is stubbed to an empty module via the
              # package.json `"browser"` map.
              #
              # **Default** imports (`import x from 'fs/promises'`) are NOT
              # blocked: they bind to the stub's `default` export and
              # survive bundling. This is the shape that bundled
              # third-party deps like `adm-zip` rely on (it does
              # `import path from 'path'`), and at runtime browser code
              # never reaches the call sites.
              #
              # Specifiers covered: `fs`, `fs/promises`, `stream/promises`,
              # `child_process`, `path`, `os`, `net`, `tls`, `readline`.
              # `crypto` and `stream` are intentionally NOT covered â€” the
              # SDK maps them to real browser polyfills (crypto-browserify
              # / stream-browserify), so top-level imports there are fine.
              run: |
                  set -eu
                  FORBIDDEN_RE="^import (\{[^}]*\}|\* as [a-zA-Z_\$][a-zA-Z0-9_\$]*) from '(fs(/promises)?|stream/promises|child_process|path|os|net|tls|readline)';"
                  echo "Scanning lib.esm/ for forbidden top-level Node-only named/namespace imports..."
                  if grep -nEH "$FORBIDDEN_RE" lib.esm/*.js; then
                      echo ""
                      echo "::error::Found top-level named or namespace import of a Node-only built-in in the SDK ESM bundle."
                      echo "::error::These break browser bundlers (Turbopack/Vite/strict Webpack) that stub the specifier to an empty module."
                      echo "::error::Defer to runtime: \`const x = await import('<specifier>')\` inside an async function."
                      exit 1
                  fi
                  echo "OK â€” no forbidden top-level Node-only named/namespace imports found."

            - name: Install fixture dependencies
              working-directory: tests/web-bundler-app
              run: npm install --no-audit --no-fund

            - name: Build fixture (${{ matrix.bundler }})
              working-directory: tests/web-bundler-app
              run: |
                  if [ "${{ matrix.bundler }}" = "turbopack" ]; then
                      npm run build:turbopack
                  else
                      npm run build:webpack
                  fi
              timeout-minutes: 5

    web-bundler-summary:
        name: Web bundler test summary
        runs-on: ubuntu-latest
        needs: [web-bundler-build]
        if: always()

        steps:
            - name: Check build results
              run: |
                  if [ "${{ needs.web-bundler-build.result }}" = "success" ]; then
                      echo "âś… All web-bundler builds passed."
                  else
                      echo "âťŚ Web-bundler builds failed: ${{ needs.web-bundler-build.result }}"
                      exit 1
                  fi
